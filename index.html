<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#080808">
<title>CineVault</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   TOKENS & BASE
══════════════════════════════════════════ */
:root{
  --red:#e50914; --red2:#b20710;
  --bg:#080808; --s1:#111; --s2:#181818; --s3:#202020;
  --border:rgba(255,255,255,0.07);
  --text:#f0f0f0; --muted:#666;
  --hh:56px; --pad:20px; --pad-d:32px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:4px;}

/* ══════════════════════════════════════════
   HEADER
══════════════════════════════════════════ */
header{
  height:var(--hh); display:flex; align-items:center; justify-content:space-between; gap:12px;
  padding:0 var(--pad); background:rgba(8,8,8,0.96); backdrop-filter:blur(18px);
  position:fixed; top:0; left:0; right:0; z-index:200; border-bottom:1px solid var(--border);
}
@media(min-width:600px){header{padding:0 var(--pad-d);}}
header.hidden{opacity:0; pointer-events:none;}
.logo{font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:3px; color:var(--red); cursor:pointer;}
.nav{display:flex; gap:4px;}
.nav-btn{padding:5px 14px; border-radius:7px; border:none; background:transparent; color:var(--muted); cursor:pointer; font-size:13px; font-weight:500;}
.nav-btn.active{background:rgba(229,9,20,.14); color:var(--text); border:1px solid rgba(229,9,20,.35);}
.search-wrap{position:relative; flex:1; max-width:260px;}
#searchInput{width:100%; padding:7px 10px 7px(32px); border-radius:8px; border:1px solid #1e1e1e; background:#131313; color:var(--text); font-size:13px;}

/* ══════════════════════════════════════════
   PAGES & GRID
══════════════════════════════════════════ */
.page{display:none;}
.page.active{display:block;}
#homePage{padding-top:calc(var(--hh) + 16px);}
.section{padding-bottom:32px;}
.section-head{display:flex; padding:0 var(--pad); margin-bottom:14px;}
.section-title{font-family:'Bebas Neue',sans-serif; font-size:17px; letter-spacing:2px; color:var(--muted); text-transform:uppercase;}
.section-title b{color:var(--text); font-weight:400;}
.h-row{display:flex; gap:12px; overflow-x:auto; padding:2px var(--pad) 10px; scroll-snap-type:x mandatory;}
.h-row::-webkit-scrollbar{display:none;}

/* ══════════════════════════════════════════
   CARDS
══════════════════════════════════════════ */
.card{flex-shrink:0; width:140px; border-radius:10px; overflow:hidden; cursor:pointer; background:var(--s2); border:1px solid transparent; transition:transform .2s;}
.card:hover{transform:translateY(-5px); border-color:var(--red);}
.card-thumb{width:100%; aspect-ratio:2/3; position:relative; overflow:hidden; background:#141414;}
.card-thumb img{width:100%; height:100%; object-fit:cover;}
.card-info{padding:9px; font-size:11.5px;}
.card-title{font-weight:600; color:var(--text); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; height:30px;}

/* ══════════════════════════════════════════
   MODAL
══════════════════════════════════════════ */
.modal-backdrop{display:none; position:fixed; inset:0; background:rgba(0,0,0,.85); backdrop-filter:blur(20px); z-index:300;}
.modal-sheet{display:none; position:fixed; inset:0; z-index:310; display:flex; align-items:center; justify-content:center;}
.modal-inner{width:90%; max-width:900px; height:80vh; background:var(--bg); border-radius:12px; overflow:hidden; display:flex; position:relative; border:1px solid var(--border);}
@media(max-width:700px){ .modal-inner{flex-direction:column; height:95vh; width:95%;} }
.modal-left{width:35%; position:relative; background:#000;}
@media(max-width:700px){ .modal-left{width:100%; height:40%;} }
.ml-img{width:100%; height:100%; object-fit:cover; opacity:0.5;}
.modal-right{flex:1; padding:30px; overflow-y:auto;}
.m-title{font-family:'Bebas Neue',sans-serif; font-size:32px; color:#fff;}
.btn-row{display:flex; gap:10px; margin-top:20px;}
.btn{padding:10px 20px; border-radius:6px; border:none; font-weight:600; cursor:pointer;}
.btn-watch{background:var(--red); color:#fff;}
.btn-trailer{background:var(--s3); color:#fff;}
.close-modal{position:absolute; top:15px; right:15px; background:rgba(0,0,0,0.5); color:#fff; border:none; width:30px; height:30px; border-radius:50%; cursor:pointer; z-index:10;}

/* ══════════════════════════════════════════
   PLAYER
══════════════════════════════════════════ */
#playerPage{padding-top:var(--hh); min-height:100vh;}
.player-wrap-outer{max-width:1000px; margin:20px auto; padding:0 20px;}
.player-box{position:relative; width:100%; aspect-ratio:16/9; background:#000; border-radius:8px; overflow:hidden;}
#playerFrame{width:100%; height:100%; border:none;}
.ctrl-row{display:flex; gap:10px; margin-top:15px; align-items:center;}
.src-sel{background:var(--s2); color:#fff; border:1px solid var(--border); padding:8px; border-radius:5px;}

.toast{position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 20px; border-radius:5px; display:none; z-index:1000;}
</style>
</head>
<body>

<header id="header">
  <div class="logo" onclick="location.hash=''">CINEVAULT</div>
  <div class="nav">
    <button class="nav-btn active" id="btn-movie" onclick="setType('movie')">Movies</button>
    <button class="nav-btn" id="btn-tv" onclick="setType('tv')">TV Shows</button>
  </div>
  <div class="search-wrap">
    <input id="searchInput" placeholder="Search...">
  </div>
</header>

<div id="homePage" class="page active">
  <div id="sectionsWrap"></div>
</div>

<div id="playerPage" class="page">
  <div class="player-wrap-outer">
    <div class="player-box">
      <iframe id="playerFrame" 
              sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-top-navigation-by-user-activation" 
              allowfullscreen></iframe>
    </div>
    <div class="ctrl-row">
       <select class="src-sel" id="serverSel" onchange="changeServer()"></select>
       <div id="epControls" style="display:none; gap:10px; display:flex;">
          <select class="src-sel" id="seasonSel" onchange="loadEpisodes()"></select>
          <select class="src-sel" id="episodeSel" onchange="changeServer()"></select>
       </div>
       <button class="btn btn-trailer" onclick="location.hash=''">Back Home</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="mBackdrop" onclick="closeModal()"></div>
<div class="modal-sheet" id="mSheet">
  <div class="modal-inner">
    <button class="close-modal" onclick="closeModal()">✕</button>
    <div class="modal-left" id="mLeft"></div>
    <div class="modal-right">
      <div class="m-title" id="mTitle"></div>
      <p id="mOverview" style="margin-top:15px; font-size:14px; color:#aaa; line-height:1.6;"></p>
      <div class="btn-row">
        <button class="btn btn-watch" onclick="openPlayer()">Watch Now</button>
        <button class="btn btn-trailer" id="mTrailerBtn">Trailer</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════════
   ANTI-REDIRECT LOGIC (THE INTERCEPTOR)
══════════════════════════════════════════ */
var prevent_bust = 0;
window.onbeforeunload = function() { prevent_bust++; };
setInterval(function() {
  if (prevent_bust > 0) {
    prevent_bust -= 2;
    // This forces the top window to stay on CineVault if an iframe triggers a redirect
    window.top.location = 'https://' + window.location.host + '/#redirect-blocked';
  }
}, 1);

/* ══════════════════════════════════════════
   PROVIDERS & API
══════════════════════════════════════════ */
const KEY = '6b2dec73b6697866a50cdaef60ccffcb';
const PROVIDERS = [
  { name: "Server 1 (4K)", movie: id => `https://vidlink.pro/movie/${id}`, tv: (id,s,e) => `https://vidlink.pro/tv/${id}/${s}/${e}` },
  { name: "Server 2 (1080p)", movie: id => `https://vidsrc.cc/v3/embed/movie/${id}`, tv: (id,s,e) => `https://vidsrc.cc/v3/embed/tv/${id}/${s}/${e}` },
  { name: "Server 3 (Multi)", movie: id => `https://vidsrc.me/embed/movie?tmdb=${id}`, tv: (id,s,e) => `https://vidsrc.me/embed/tv?tmdb=${id}&sea=${s}&epi=${e}` }
];

let mediaType = 'movie';
let currentId = null;
let currentItem = null;

async function api(path) {
  const r = await fetch(`https://api.themoviedb.org/3${path}${path.includes('?')?'&':'?'}api_key=${KEY}`);
  return r.json();
}

/* ══════════════════════════════════════════
   CORE ENGINE
══════════════════════════════════════════ */
function setType(t) {
  mediaType = t;
  document.getElementById('btn-movie').classList.toggle('active', t==='movie');
  document.getElementById('btn-tv').classList.toggle('active', t==='tv');
  loadHome();
}

async function loadHome() {
  const wrap = document.getElementById('sectionsWrap');
  wrap.innerHTML = '<p style="padding:20px;">Loading...</p>';
  const endpoint = mediaType === 'movie' ? '/movie/popular' : '/tv/popular';
  const data = await api(endpoint);
  
  wrap.innerHTML = `<div class="section"><div class="section-head"><div class="section-title">Popular ${mediaType}s</div></div><div class="h-row" id="mainRow"></div></div>`;
  const row = document.getElementById('mainRow');
  row.innerHTML = data.results.map(item => `
    <div class="card" onclick="openModal(${item.id})">
      <div class="card-thumb"><img src="https://image.tmdb.org/t/p/w342${item.poster_path}"></div>
      <div class="card-info"><div class="card-title">${item.title || item.name}</div></div>
    </div>
  `).join('');
}

async function openModal(id) {
  currentId = id;
  const data = await api(`/${mediaType}/${id}?append_to_response=videos`);
  currentItem = data;
  
  document.getElementById('mTitle').textContent = data.title || data.name;
  document.getElementById('mOverview').textContent = data.overview;
  document.getElementById('mLeft').innerHTML = `<img class="ml-img" src="https://image.tmdb.org/t/p/w780${data.backdrop_path}">`;
  
  const trailer = (data.videos.results || []).find(v => v.type === 'Trailer');
  const tBtn = document.getElementById('mTrailerBtn');
  if(trailer) {
    tBtn.style.display = 'block';
    tBtn.onclick = () => window.open(`https://youtube.com/watch?v=${trailer.key}`, '_blank');
  } else {
    tBtn.style.display = 'none';
  }

  document.getElementById('mBackdrop').style.display = 'block';
  document.getElementById('mSheet').style.display = 'flex';
}

function closeModal() {
  document.getElementById('mBackdrop').style.display = 'none';
  document.getElementById('mSheet').style.display = 'none';
}

/* ══════════════════════════════════════════
   PLAYER LOGIC
══════════════════════════════════════════ */
function openPlayer() {
  closeModal();
  location.hash = `play/${mediaType}/${currentId}`;
}

async function handleRoute() {
  const hash = location.hash.substring(1);
  if (hash.startsWith('play/')) {
    const [_, type, id] = hash.split('/');
    mediaType = type; currentId = id;
    showPlayer();
  } else {
    document.getElementById('homePage').classList.add('active');
    document.getElementById('playerPage').classList.remove('active');
    loadHome();
  }
}

async function showPlayer() {
  document.getElementById('homePage').classList.remove('active');
  document.getElementById('playerPage').classList.add('active');
  
  const sel = document.getElementById('serverSel');
  sel.innerHTML = PROVIDERS.map((p, i) => `<option value="${i}">${p.name}</option>`).join('');
  
  if (mediaType === 'tv') {
    document.getElementById('epControls').style.display = 'flex';
    const show = await api(`/tv/${currentId}`);
    const sSel = document.getElementById('seasonSel');
    sSel.innerHTML = show.seasons.filter(s=>s.season_number > 0).map(s => `<option value="${s.season_number}">Season ${s.season_number}</option>`).join('');
    await loadEpisodes();
  } else {
    document.getElementById('epControls').style.display = 'none';
    changeServer();
  }
}

async function loadEpisodes() {
  const s = document.getElementById('seasonSel').value;
  const data = await api(`/tv/${currentId}/season/${s}`);
  document.getElementById('episodeSel').innerHTML = data.episodes.map(e => `<option value="${e.episode_number}">Episode ${e.episode_number}</option>`).join('');
  changeServer();
}

function changeServer() {
  const sIdx = document.getElementById('serverSel').value;
  const frame = document.getElementById('playerFrame');
  const p = PROVIDERS[sIdx];
  
  if (mediaType === 'movie') {
    frame.src = p.movie(currentId);
  } else {
    const s = document.getElementById('seasonSel').value;
    const e = document.getElementById('episodeSel').value;
    frame.src = p.tv(currentId, s, e);
  }
}

window.addEventListener('hashchange', handleRoute);
handleRoute();

</script>
</body>
</html>
