<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#080808">
<title>CineVault</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   TOKENS
══════════════════════════════════════════ */
:root{
  --red:#e50914; --red2:#b20710;
  --bg:#080808; --s1:#111; --s2:#181818; --s3:#202020;
  --border:rgba(255,255,255,0.07);
  --text:#f0f0f0; --muted:#666;
  --hh:56px;          /* header height */
  --pad:20px;         /* horizontal page padding (mobile) */
  --pad-d:32px;       /* desktop */
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:4px;}

/* ══════════════════════════════════════════
   HEADER
══════════════════════════════════════════ */
header{
  height:var(--hh);
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:0 var(--pad);
  background:rgba(8,8,8,0.96);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  position:fixed;top:0;left:0;right:0;z-index:200;
  border-bottom:1px solid var(--border);
  transition:opacity .2s;
}
@media(min-width:600px){header{padding:0 var(--pad-d);}}
header.hidden{opacity:0;pointer-events:none;}

.logo{
  font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;
  color:var(--red);cursor:pointer;user-select:none;flex-shrink:0;
}
.nav{display:flex;gap:4px;flex-shrink:0;}
.nav-btn{
  padding:5px 14px;border-radius:7px;border:none;
  background:transparent;color:var(--muted);
  cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
  transition:all .2s;
}
.nav-btn:hover{color:var(--text);}
.nav-btn.active{background:rgba(229,9,20,.14);color:var(--text);border:1px solid rgba(229,9,20,.35);}

.search-wrap{position:relative;flex:1;max-width:260px;}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.3;pointer-events:none;}
#searchInput{
  width:100%;padding:7px 10px 7px 32px;
  border-radius:8px;border:1px solid #1e1e1e;
  background:#131313;color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:13px;
  -webkit-appearance:none;
}
#searchInput:focus{outline:none;border-color:#303030;}

/* ══════════════════════════════════════════
   PAGES
══════════════════════════════════════════ */
.page{display:none;}
.page.active{display:block;}
#homePage{padding-top:calc(var(--hh) + 16px);}

/* ══════════════════════════════════════════
   SECTION ROWS
══════════════════════════════════════════ */
.section{padding-bottom:32px;}
.section-head{
  display:flex;align-items:baseline;justify-content:space-between;
  padding:0 var(--pad);margin-bottom:14px;
}
@media(min-width:600px){.section-head{padding:0 var(--pad-d);}}
.section-title{
  font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;
  color:var(--muted);text-transform:uppercase;
}
.section-title b{color:var(--text);font-weight:400;}

.h-row{
  display:flex;gap:12px;
  overflow-x:auto;padding:2px var(--pad) 10px;
  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
@media(min-width:600px){.h-row{gap:14px;padding-left:var(--pad-d);padding-right:var(--pad-d);}}
.h-row::-webkit-scrollbar{display:none;}

/* search results */
.search-section{padding:0 var(--pad) 40px;display:none;}
@media(min-width:600px){.search-section{padding-left:var(--pad-d);padding-right:var(--pad-d);}}
.search-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px;}
@media(min-width:600px){.search-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:18px;}}

/* ══════════════════════════════════════════
   CARD
══════════════════════════════════════════ */
.card{
  flex-shrink:0;width:140px;
  display:flex;flex-direction:column;
  border-radius:10px;overflow:hidden;cursor:pointer;
  background:var(--s2);scroll-snap-align:start;
  border:1px solid transparent;
  transition:transform .22s cubic-bezier(.25,.46,.45,.94),box-shadow .22s,border-color .22s;
  /* touch devices: no hover flash */
  -webkit-user-select:none;user-select:none;
}
@media(min-width:600px){.card{width:158px;}}
@media(hover:hover){
  .card:hover{transform:translateY(-6px) scale(1.03);box-shadow:0 16px 40px rgba(0,0,0,.7);border-color:rgba(229,9,20,.22);}
  .card:hover .card-thumb img{transform:scale(1.06);}
  .card:hover .play-ring{opacity:1;transform:translate(-50%,-50%) scale(1);}
  .card:hover .card-play-bg{background:rgba(0,0,0,.35);}
}
/* tap highlight on touch */
.card:active{opacity:.7;} /* FIX 2: removed transform to fix active scale bug */

.card-thumb{
  width:100%;aspect-ratio:2/3;
  position:relative;overflow:hidden;flex-shrink:0;background:#141414;
}
.card-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .35s cubic-bezier(.25,.46,.45,.94);}
.no-poster{width:100%;height:100%;background:linear-gradient(145deg,#1c1c1c,#0f0f0f);display:flex;align-items:center;justify-content:center;font-size:36px;}

.card-play-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;transition:background .22s;}
.play-ring{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(.7);
  width:40px;height:40px;border-radius:50%;
  background:rgba(229,9,20,.88);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s,transform .22s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 4px 16px rgba(229,9,20,.5);
}
.card-rating{
  position:absolute;top:7px;right:7px;
  background:rgba(0,0,0,.72);backdrop-filter:blur(6px);
  padding:2px 6px;border-radius:20px;
  font-size:10px;font-weight:600;color:#ffd700;
  border:1px solid rgba(255,215,0,.2);
}
.card-type-badge{
  position:absolute;top:7px;left:7px;
  background:rgba(229,9,20,.82);
  padding:2px 6px;border-radius:4px;
  font-size:9px;font-weight:700;color:#fff;letter-spacing:.5px;text-transform:uppercase;
}
.card-info{
  flex:1;display:flex;flex-direction:column;justify-content:space-between;
  padding:9px 9px 8px;gap:5px;
}
.card-title{
  font-size:11.5px;font-weight:600;line-height:1.35;color:var(--text);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:auto;}
.card-year{font-size:10px;color:var(--muted);}
.card-genre{font-size:10px;color:#444;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:65px;}

/* search grid: full width */
.search-grid .card,.similar-grid .card{width:100%;}

/* skeleton */
.skel{flex-shrink:0;width:140px;border-radius:10px;overflow:hidden;background:var(--s2);scroll-snap-align:start;}
@media(min-width:600px){.skel{width:158px;}}
.skel-thumb{width:100%;aspect-ratio:2/3;background:linear-gradient(90deg,#161616 25%,#202020 50%,#161616 75%);background-size:200% 100%;animation:shim 1.4s infinite;}
.skel-info{padding:9px;}
.skel-line{height:9px;border-radius:4px;margin-bottom:7px;background:linear-gradient(90deg,#161616 25%,#202020 50%,#161616 75%);background-size:200% 100%;animation:shim 1.4s infinite;}
.skel-line.s{width:55%;}
@keyframes shim{to{background-position:-200% 0;}}
.similar-grid .skel{width:100%;}

/* ══════════════════════════════════════════
   MODAL
══════════════════════════════════════════ */
.modal-backdrop{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.85);
  backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  z-index:300;
}
.modal-sheet{
  display:none;position:fixed;inset:0;z-index:310;
  animation:sheetIn .28s cubic-bezier(.25,.46,.45,.94);
}
@keyframes sheetIn{from{opacity:0;transform:scale(.97) translateY(14px)}to{opacity:1;transform:none}}

.modal-inner{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  overflow:hidden;
}
@media(min-width:700px){
  .modal-inner{flex-direction:row;}
}

/* ── LEFT PANEL ── */
.modal-left{
  position:relative;
  width:100%;height:56vw;min-height:200px;max-height:320px;
  flex-shrink:0;overflow:hidden;background:#000;
}
@media(min-width:700px){
  .modal-left{
    width:300px;height:100%;
    max-height:none;
  }
}
@media(min-width:900px){.modal-left{width:340px;}}

/* parallax layers */
.ml-blur{
  position:absolute;inset:-10%;width:120%;height:120%;
  object-fit:cover;
  filter:blur(26px) brightness(.28) saturate(1.4);
  will-change:transform;pointer-events:none;
}
.ml-blur-ph{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,#1a1a1a,#040404);}
.ml-img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;filter:brightness(.42) saturate(1.1);
  transform-origin:center top;will-change:transform;pointer-events:none;
}
.ml-vignette{
  position:absolute;inset:0;pointer-events:none;
  background:
    linear-gradient(to right, rgba(0,0,0,.5) 0%,transparent 30%,rgba(0,0,0,.6) 100%),
    linear-gradient(to bottom, rgba(0,0,0,.25) 0%,transparent 20%,transparent 60%,rgba(0,0,0,.92) 100%);
}
@media(max-width:699px){
  .ml-vignette{background:linear-gradient(to bottom,rgba(0,0,0,.1) 0%,rgba(0,0,0,.0) 40%,rgba(8,8,8,.98) 100%);}
}
.ml-poster-wrap{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;padding:28px 20px;pointer-events:none;
}
.ml-poster{
  width:120px;border-radius:11px;
  box-shadow:0 20px 55px rgba(0,0,0,.88),0 0 0 1px rgba(255,255,255,.08);
  display:block;will-change:transform;
}
@media(min-width:700px){.ml-poster{width:148px;}}
.ml-rating{
  display:flex;align-items:center;gap:6px;
  background:rgba(0,0,0,.68);border:1px solid rgba(255,215,0,.28);
  border-radius:20px;padding:4px 14px;
  font-size:12px;font-weight:700;color:#ffd700;
  backdrop-filter:blur(8px);will-change:transform;
}
.modal-left::after{
  content:'';position:absolute;top:15%;right:0;
  width:1px;height:70%;
  background:linear-gradient(to bottom,transparent,rgba(229,9,20,.2),transparent);
}
@media(max-width:699px){.modal-left::after{display:none;}}

/* ── RIGHT PANEL ── */
.modal-right{
  flex:1;
  overflow-y:auto;overflow-x:hidden;
  padding:20px var(--pad) 40px;
  background:rgba(10,10,10,.97);
  -webkit-overflow-scrolling:touch;
  scrollbar-width:thin;scrollbar-color:#222 transparent;
}
@media(min-width:700px){
  .modal-right{
    height:100%;
    padding:44px 36px 60px 36px;
    background:linear-gradient(108deg,rgba(8,8,8,.94) 0%,rgba(13,13,13,.98) 100%);
  }
}
.modal-right::-webkit-scrollbar{width:3px;}
.modal-right::-webkit-scrollbar-thumb{background:#222;}

.mr-inner{
  display:flex;flex-direction:column;
  min-height:100%;
}

.m-type{
  display:inline-block;font-size:9.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;
  padding:3px 9px;border-radius:4px;
  background:rgba(229,9,20,.16);border:1px solid rgba(229,9,20,.3);color:var(--red);
  margin-bottom:10px;
}
.m-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:30px;letter-spacing:1.5px;line-height:1.0;
  color:#fff;margin-bottom:6px;
}
@media(min-width:700px){.m-title{font-size:38px;}}
.m-tagline{font-size:12px;color:#555;font-style:italic;margin-bottom:16px;line-height:1.5;}
.meta-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;}
.chip{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:500;}
.chip.red {background:rgba(229,9,20,.15);border:1px solid rgba(229,9,20,.28);color:#ff7070;}
.chip.dim {background:rgba(255,255,255,.05);border:1px solid var(--border);color:#aaa;}
.chip.gold{background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.17);color:#ffd700;}
.chip.grn {background:rgba(80,200,100,.09);border:1px solid rgba(80,200,100,.18);color:#6ee07a;}

.m-divider{height:1px;background:rgba(255,255,255,.055);margin:18px 0;}
.m-overview{font-size:13px;line-height:1.8;color:#999;margin-bottom:22px;}

.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:26px;}
.btn{
  display:flex;align-items:center;gap:7px;
  padding:10px 22px;border-radius:9px;border:none;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;transition:all .18s;
}
.btn-watch{background:var(--red);color:#fff;box-shadow:0 4px 16px rgba(229,9,20,.32);}
.btn-watch:hover{background:var(--red2);transform:scale(1.03);}
.btn-watch:active{transform:scale(.97);}
.btn-trailer{background:rgba(255,255,255,.07);color:#fff;border:1px solid rgba(255,255,255,.13);}
.btn-trailer:hover{background:rgba(255,255,255,.12);}
.btn-trailer:active{transform:scale(.97);}

/* ── CAST ── */
.cast-section{
  flex:1;display:flex;flex-direction:column;
  margin-top:auto;
}
.cast-section h4{
  font-size:10px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:1.5px;margin-bottom:11px;
}
.cast-list{
  display:flex;flex-direction:column;gap:0;
  overflow-y:auto;overflow-x:hidden;
  max-height:300px;
  scrollbar-width:thin;scrollbar-color:#222 transparent;
  mask-image:linear-gradient(to bottom,transparent 0,#000 5%,#000 95%,transparent 100%);
  -webkit-mask-image:linear-gradient(to bottom,transparent 0,#000 5%,#000 95%,transparent 100%);
}
@media(max-width:699px){
  .cast-list{max-height:none;overflow-y:visible;mask-image:none;-webkit-mask-image:none;}
  .cast-section{margin-top:0;}
}
.cast-list::-webkit-scrollbar{width:3px;}
.cast-list::-webkit-scrollbar-thumb{background:#222;}
.cast-row{
  display:flex;align-items:center;gap:11px;
  padding:7px 4px;
  border-bottom:1px solid rgba(255,255,255,.04);
  border-radius:6px;transition:background .15s;
}
.cast-row:last-child{border-bottom:none;}
.cast-row:hover{background:rgba(255,255,255,.04);}
.cast-face,.cast-face-ph{
  width:42px;height:52px;border-radius:7px;
  object-fit:cover;flex-shrink:0;display:block;background:#1a1a1a;
}
.cast-face-ph{display:flex;align-items:center;justify-content:center;font-size:18px;}
.cast-info{flex:1;min-width:0;}
.cast-name{font-size:12.5px;font-weight:500;color:#ddd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cast-char{font-size:11px;color:#484848;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}

.close-btn{
  position:fixed;top:12px;right:12px;
  width:36px;height:36px;border-radius:50%;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.9);color:#fff;font-size:15px;
  cursor:pointer;z-index:999;display:none;
  align-items:center;justify-content:center;transition:all .18s;
}
.close-btn:hover{background:rgba(229,9,20,.7);}

/* ══════════════════════════════════════════
   PLAYER PAGE
══════════════════════════════════════════ */
#playerPage{padding-top:var(--hh);min-height:100vh;}
.player-topbar{display:flex;align-items:center;gap:12px;padding:12px var(--pad) 0;}
@media(min-width:600px){.player-topbar{padding:14px var(--pad-d) 0;}}
.back-btn{
  display:flex;align-items:center;gap:5px;flex-shrink:0;
  background:rgba(255,255,255,.05);border:1px solid var(--border);
  color:var(--text);padding:7px 14px;border-radius:7px;
  cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:all .18s;
}
.back-btn:hover{background:rgba(255,255,255,.1);}
.back-btn:active{transform:scale(.96);}
.player-meta{flex:1;overflow:hidden;}
.p-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:#bbb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.p-sub{font-size:11px;color:var(--muted);margin-top:2px;}

.player-wrap-outer{max-width:1100px;margin:12px auto 0;padding:0 var(--pad);}
@media(min-width:600px){.player-wrap-outer{padding:0 var(--pad-d);}}
.player-box{
  position:relative;width:100%;aspect-ratio:16/9;
  background:#000;border-radius:10px;overflow:hidden;
  box-shadow:0 18px 55px rgba(0,0,0,.9);
  border:1px solid rgba(255,255,255,.04);
}
#playerFrame{width:100%;height:100%;border:none;display:block;}
.p-loading{
  position:absolute;inset:0;background:#000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
  z-index:5;transition:opacity .4s;
}
.p-loading.gone{opacity:0;pointer-events:none;}
.spinner{width:44px;height:44px;border:3px solid rgba(255,255,255,.07);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.p-load-text{font-size:13px;color:var(--muted);}
.p-load-sub{font-size:11px;color:#383838;}

/* controls */
.ctrl-row{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap;}
.src-wrap{position:relative;flex:1;min-width:160px;}
.src-btn{
  width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;
  padding:9px 13px;border-radius:8px;
  background:var(--s2);border:1px solid var(--border);
  color:var(--text);cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
  transition:border-color .18s;user-select:none;
}
.src-btn:hover{border-color:rgba(255,255,255,.14);}
.src-btn.open{border-color:rgba(229,9,20,.5);}
.src-dot{width:7px;height:7px;border-radius:50%;background:#333;flex-shrink:0;transition:background .2s;}
.src-dot.on{background:var(--red);box-shadow:0 0 6px rgba(229,9,20,.6);}
.src-count{font-size:11px;color:var(--muted);}
.chevron{font-size:10px;color:var(--muted);transition:transform .18s;display:inline-block;}
.chevron.up{transform:rotate(180deg);}
.src-dd{
  display:none;position:absolute;top:calc(100% + 6px);left:0;right:0;
  background:var(--s3);border:1px solid var(--border);
  border-radius:10px;overflow:hidden;
  box-shadow:0 12px 36px rgba(0,0,0,.85);z-index:99;
  max-height:280px;overflow-y:auto;
}
.src-dd.open{display:block;animation:ddIn .15s ease;}
@keyframes ddIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
.src-opt{
  display:flex;align-items:center;gap:10px;
  padding:9px 13px;cursor:pointer;font-size:13px;
  transition:background .14s;
  border-bottom:1px solid rgba(255,255,255,.03);
}
.src-opt:last-child{border-bottom:none;}
.src-opt:hover{background:rgba(255,255,255,.05);}
.src-opt.sel{background:rgba(229,9,20,.1);color:#ff9090;}
.opt-n{font-size:11px;color:var(--muted);min-width:20px;}
.opt-q{margin-left:auto;font-size:10px;padding:2px 6px;border-radius:8px;}
.c-btn{
  padding:8px 14px;border-radius:7px;
  border:1px solid var(--border);background:rgba(255,255,255,.04);
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;
  cursor:pointer;transition:all .18s;white-space:nowrap;
}
.c-btn:hover{background:rgba(255,255,255,.09);}
.c-btn:active{transform:scale(.96);}
.c-btn:disabled{opacity:.3;cursor:not-allowed;}

/* TV episode row */
.ep-row{
  display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap;
  background:rgba(255,255,255,.03);border-radius:9px;
  padding:9px 12px;border:1px solid var(--border);
}
.ep-lbl{font-size:12px;color:var(--muted);white-space:nowrap;}
.ep-sel{
  padding:6px 24px 6px 9px;background:var(--s2);border:1px solid var(--border);
  color:var(--text);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:12px;
  cursor:pointer;-webkit-appearance:none;appearance:none;

const QC = { '4K':'#ffd700', '1080p':'#6ca4e8' };

/* ══════════════════════════════════════════
   CONFIG
══════════════════════════════════════════ */
const KEY  = '6b2dec73b6697866a50cdaef60ccffcb';
const BASE = 'https://api.themoviedb.org/3';
const W500 = 'https://image.tmdb.org/t/p/w500';
const W128 = 'https://image.tmdb.org/t/p/w1280';

const SECTIONS_MOVIE = [
  { title:'Trending',    sub:'This Week',   ep:'/trending/movie/week',  icon:'🔥' },
  { title:'Trending',    sub:'Today',       ep:'/trending/movie/day',   icon:'⚡' },
  { title:'Now Playing', sub:'In Cinemas',  ep:'/movie/now_playing',    icon:'🎬' },
  { title:'Top Rated',   sub:'All Time',    ep:'/movie/top_rated',      icon:'⭐' },
  { title:'Popular',     sub:'Right Now',   ep:'/movie/popular',        icon:'📈' },
  { title:'Upcoming',    sub:'Coming Soon', ep:'/movie/upcoming',       icon:'🗓' },
];
const SECTIONS_TV = [
  { title:'Trending',    sub:'This Week',   ep:'/trending/tv/week',     icon:'🔥' },
  { title:'Trending',    sub:'Today',       ep:'/trending/tv/day',      icon:'⚡' },
  { title:'Airing Today',sub:'On Air Now',  ep:'/tv/airing_today',      icon:'📡' },
  { title:'On The Air',  sub:'Currently',   ep:'/tv/on_the_air',        icon:'📺' },
  { title:'Top Rated',   sub:'All Time',    ep:'/tv/top_rated',         icon:'⭐' },
  { title:'Popular',     sub:'Right Now',   ep:'/tv/popular',           icon:'📈' },
];

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
let mediaType = 'movie';
let curId    = null;
let curItem  = null;
let trailer  = null;
let gMovies  = {};
let gTv      = {};
let debT;
let srcIdx   = 0;
let fbTimer  = null;
let ddOpen   = false;
let curS     = 1, curE = 1;

/* ══════════════════════════════════════════
   API  — proxy-aware fetch
══════════════════════════════════════════ */
const PROXIES = [
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://thingproxy.freeboard.io/fetch/${u}`,
  u => `https://api.codetabs.com/v1/proxy?quest=${u}`,
];
let _probeIdx   = -2;   
let _probeP     = null; 

async function _fetchJSON(url) {
  const r = await fetch(url, { cache: 'default' });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const txt = await r.text();
  try {
    const j = JSON.parse(txt);
    if (typeof j.contents === 'string') return JSON.parse(j.contents);
    return j;
  } catch(e) { throw new Error('Bad JSON'); }
}

async function _probe(tmdbUrl) {
  try { const j = await _fetchJSON(tmdbUrl); _probeIdx = -1; return j; } catch(e) {}
  for (let i = 0; i < PROXIES.length; i++) {
    try { const j = await _fetchJSON(PROXIES[i](tmdbUrl)); _probeIdx = i; return j; } catch(e) {}
  }
  _probeIdx = -1; return {};
}

async function api(path, page = 1) {
  const sep = path.includes('?') ? '&' : '?';
  const url = `${BASE}${path}${sep}api_key=${KEY}&page=${page}`;

  if (_probeIdx === -2) {
    if (!_probeP) _probeP = _probe(url);
    return await _probeP;
  }
  try {
    if (_probeIdx === -1) return await _fetchJSON(url);
    return await _fetchJSON(PROXIES[_probeIdx](url));
  } catch(e) {
    _probeIdx = -2; _probeP = null;
    return {};
  }
}

function toast(msg, ms = 3000) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), ms);
}
function gname(ids, map) {
  return (ids || []).slice(0,2).map(id => map[id]).filter(Boolean).join(', ');
}

/* ══════════════════════════════════════════
   ROUTING (NEW - Fixes Back Button)
══════════════════════════════════════════ */
window.addEventListener('hashchange', handleRoute);

async function handleRoute() {
  const hash = window.location.hash.substring(1);

  if (hash.startsWith('play/')) {
    const parts = hash.split('/');
    const type = parts[1];
    const id = parts[2];

    // If user navigated directly to the link, fetch details first
    if (!curItem || curId != id) {
       curId = id; mediaType = type;
       try {
           curItem = await api(`/${type}/${id}`);
       } catch(e) { console.error(e); window.location.hash = ''; return; }
    }
    renderPlayerPage();
  } else {
    renderHomePage();
  }
}

function renderHomePage() {
  stopFb(); closeDD();
  
  // Stop background video audio
  const frame = document.getElementById('playerFrame');
  if(frame) frame.src = ''; 
  
  document.getElementById('homePage').classList.add('active');
  document.getElementById('playerPage').classList.remove('active');
  document.getElementById('header').classList.remove('hidden');
  document.body.style.overflow = '';

  // If sections aren't loaded yet and no search is active, load them
  if (!document.getElementById('sectionsWrap').innerHTML && !document.getElementById('searchInput').value) {
      loadHome();
  }
}

async function renderPlayerPage() {
  closeModal();
  curS = 1; curE = 1;
  document.getElementById('homePage').classList.remove('active');
  document.getElementById('playerPage').classList.add('active');
  document.getElementById('header').classList.remove('hidden');
  document.body.style.overflow = '';

  document.getElementById('pTitle').textContent = curItem ? (curItem.title || curItem.name) : '';
  document.getElementById('pSub').textContent   = '';

  if (mediaType === 'tv') {
    document.getElementById('epRow').style.display = 'flex';
    await buildSeasons();
  } else {
    document.getElementById('epRow').style.display = 'none';
  }
  buildDD();
  loadSrc(0);
  loadSimilar();
}

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
async function init() {
  const [gm, gt] = await Promise.all([api('/genre/movie/list'), api('/genre/tv/list')]);
  (gm.genres || []).forEach(g => gMovies[g.id] = g.name);
  (gt.genres || []).forEach(g => gTv[g.id]     = g.name);
  
  // Trigger initial route
  handleRoute();
}

/* ══════════════════════════════════════════
   HOME
══════════════════════════════════════════ */
function goHome() {
  window.location.hash = ''; // Using hash triggers handleRoute -> renderHomePage
  // Reset search when explicitly clicking the home logo
  document.getElementById('searchInput').value = '';
  document.getElementById('searchSection').style.display = 'none';
  document.getElementById('sectionsWrap').style.display  = '';
}

function switchType(t) {
  mediaType = t;
  document.getElementById('moviesTab').classList.toggle('active', t === 'movie');
  document.getElementById('tvTab').classList.toggle('active', t === 'tv');
  const q = document.getElementById('searchInput').value.trim();
  if (q) { search(q); return; }
  loadHome();
}

async function loadHome() {
  document.getElementById('searchSection').style.display = 'none';
  document.getElementById('sectionsWrap').style.display  = '';
  const secs = mediaType === 'movie' ? SECTIONS_MOVIE : SECTIONS_TV;
  const wrap = document.getElementById('sectionsWrap');

  wrap.innerHTML = secs.map((s, i) => `
    <div class="section" id="sec${i}">
      <div class="section-head">
        <div class="section-title">${s.icon} ${s.title} <b>— ${s.sub}</b></div>
      </div>
      <div class="h-row" id="row${i}">${skels(10)}</div>
    </div>`).join('');

  await api(secs[0].ep, 1);  
  secs.forEach(async (s, i) => {
    const [p1, p2] = await Promise.all([api(s.ep, 1), api(s.ep, 2)]);
    const results  = [...(p1.results || []), ...(p2.results || [])];
    const row = document.getElementById(`row${i}`);
    if (!row) return;
    const currentGmap = mediaType === 'movie' ? gMovies : gTv;
    row.innerHTML = results.length
      ? results.map(item => cardHTML(item, mediaType, currentGmap)).join('')
      : `<p class="empty">No results</p>`;
  });
}

/* ── search ── */
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(debT);
  debT = setTimeout(() => search(e.target.value), 380);
});

async function search(q) {
  if (!q.trim()) {
    document.getElementById('searchSection').style.display = 'none';
    document.getElementById('sectionsWrap').style.display  = '';
    if (!document.getElementById('sectionsWrap').innerHTML) loadHome();
    return;
  }

  // FIX: If we are searching from inside the player page, force switch to home view
  if (window.location.hash.startsWith('#play')) {
      window.location.hash = ''; // Navigates out and pauses video automatically
  }

  document.getElementById('sectionsWrap').style.display  = 'none';
  document.getElementById('searchSection').style.display = 'block';
  document.getElementById('searchLabel').textContent = `"${q}"`;

  const grid = document.getElementById('searchGrid');
  grid.innerHTML = skels(12, true);

  const gmap = mediaType === 'movie' ? gMovies : gTv;
  const [p1, p2] = await Promise.all([
    api(`/search/multi?query=${encodeURIComponent(q)}`, 1),
    api(`/search/multi?query=${encodeURIComponent(q)}`, 2),
  ]);
  const results = [...(p1.results||[]), ...(p2.results||[])]
    .filter(x => x.media_type === 'movie' || x.media_type === 'tv');

  grid.innerHTML = results.length
    ? results.map(item => cardHTML(item, mediaType, gmap)).join('')
    : `<div class="empty">No results for "${q}"</div>`;
}

function skels(n, wide = false) {
  return Array(n).fill(`<div class="skel${wide?' skel-wide':''}">
    <div class="skel-thumb"></div>
    <div class="skel-info"><div class="skel-line"></div><div class="skel-line s"></div></div>
  </div>`).join('');
}

function cardHTML(item, t, gmap) {
  const title  = (item.title || item.name || 'Untitled').replace(/"/g,'&quot;');
  const year   = (item.release_date || item.first_air_date || '').split('-')[0];
  const rating = item.vote_average ? item.vote_average.toFixed(1) : null;
  const poster = item.poster_path ? W500 + item.poster_path : null;
  const genre  = gname(item.genre_ids, gmap);
  const mt     = (item.media_type === 'movie' || item.media_type === 'tv') ? item.media_type : (t || mediaType || 'movie');
  const badge  = (item.media_type && item.media_type !== t)
    ? `<div class="card-type-badge">${item.media_type === 'movie' ? 'Film' : 'TV'}</div>` : '';

  return `<div class="card" onclick="openModal(${item.id},'${mt}')">
    <div class="card-thumb">
      ${poster ? `<img src="${poster}" alt="${title}">` : `<div class="no-poster">🎬</div>`}
      <div class="card-play-bg">
        <div class="play-ring">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </div>
      </div>
      ${rating ? `<div class="card-rating">★ ${rating}</div>` : ''}
      ${badge}
    </div>
    <div class="card-info">
      <div class="card-title">${title}</div>
      <div class="card-foot">
        <span class="card-year">${year}</span>
        ${genre ? `<span class="card-genre">${genre}</span>` : ''}
      </div>
    </div>
  </div>`;
}

/* ══════════════════════════════════════════
   MODAL
══════════════════════════════════════════ */
async function openModal(id, t) {
  toast('Loading...', 5000); 

  t = t || mediaType;
  curId = id; mediaType = t;
  document.getElementById('moviesTab').classList.toggle('active', t === 'movie');
  document.getElementById('tvTab').classList.toggle('active', t === 'tv');

  try {
    const [d, credits, videos] = await Promise.all([
      api(`/${t}/${id}`),
      api(`/${t}/${id}/credits`),
      api(`/${t}/${id}/videos`),
    ]);
    curItem = d;

    const mLeft = document.getElementById('mLeft');
    const bp = d.backdrop_path ? W128 + d.backdrop_path : null;
    const pp = d.poster_path   ? W500 + d.poster_path   : null;
    const rating = d.vote_average ? d.vote_average.toFixed(1) : null;

    if (bp || pp) {
      mLeft.innerHTML = `
        ${bp ? `<img class="ml-blur" src="${bp}" alt="">` : `<div class="ml-blur-ph"></div>`}
        ${bp ? `<img class="ml-img" id="mlImg" src="${bp}" alt="">` : `<img class="ml-img" id="mlImg" src="${pp}" alt="">`}
        <div class="ml-vignette"></div>
        <div class="ml-poster-wrap">
          ${pp ? `<img class="ml-poster" id="mlPoster" src="${pp}" alt="">` : ''}
          ${rating ? `<div class="ml-rating" id="mlRating">★ ${rating}</div>` : ''}
        </div>`;
    } else {
      mLeft.innerHTML = `<div class="ml-blur-ph"></div><div class="ml-vignette"></div><div class="ml-poster-wrap" style="font-size:64px;">🎬</div>`;
    }

    document.getElementById('mTypeBadge').innerHTML = `<div class="m-type">${t === 'movie' ? 'Movie' : 'TV Series'}</div>`;
    document.getElementById('mTitle').textContent   = d.title || d.name;
    document.getElementById('mTagline').textContent = d.tagline || '';

    const gmap   = t === 'movie' ? gMovies : gTv;
    const genres = (d.genres || []).slice(0,3).map(g => `<span class="chip dim">${g.name}</span>`).join('');
    const rt     = d.runtime ? `<span class="chip gold">⏱ ${Math.floor(d.runtime/60)}h ${d.runtime%60}m</span>` : '';
    const eps    = d.number_of_episodes ? `<span class="chip gold">📺 ${d.number_of_episodes} eps</span>` : '';
    const status = d.status ? `<span class="chip grn">${d.status}</span>` : '';
    document.getElementById('mMeta').innerHTML =
      `<span class="chip red">★ ${d.vote_average?.toFixed(1)||'—'}</span>
       <span class="chip dim">${(d.release_date||d.first_air_date||'').split('-')[0]}</span>
       ${rt}${eps}${status}${genres}`;

    document.getElementById('mOverview').textContent = d.overview || 'No description available.';

    const trk = (videos.results||[]).find(x=>x.site==='YouTube'&&x.type==='Trailer')
             || (videos.results||[]).find(x=>x.site==='YouTube');
    trailer = trk ? trk.key : null;
    const tb = document.getElementById('trailerBtn');
    tb.disabled = !trailer; tb.style.opacity = trailer ? '1' : '0.4';

    const castHtml = (credits.cast||[]).slice(0,20).map(p => `
      <div class="cast-row">
        ${p.profile_path ? `<img class="cast-face" src="${W500}${p.profile_path}" alt="${p.name}">` : `<div class="cast-face-ph">👤</div>`}
        <div class="cast-info">
          <div class="cast-name">${p.name}</div>
          ${p.character ? `<div class="cast-char">${p.character.replace(/\(.*?\)/g,'').trim()}</div>` : ''}
        </div>
      </div>`).join('');
    document.getElementById('mCast').innerHTML = castHtml || '<p style="color:#444;font-size:12px;padding:8px 0">No cast data</p>';

    const mRight  = document.getElementById('mRight');
    let rafId = null, lastSY = 0;
    function onScroll() { lastSY = mRight.scrollTop; if (!rafId) rafId = requestAnimationFrame(applyP); }
    function applyP() {
      rafId = null; const t = lastSY;
      const img = document.getElementById('mlImg'), poster = document.getElementById('mlPoster'), rat = document.getElementById('mlRating');
      if (img) img.style.transform = `translateY(${t * 0.2}px) scale(1.1)`;
      if (poster) poster.style.transform = `translateY(${t * 0.06}px)`;
      if (rat) rat.style.transform = `translateY(${t * 0.04}px)`;
    }
    mRight.scrollTop = 0;
    mRight.removeEventListener('scroll', mRight._pFn);
    mRight._pFn = onScroll;
    mRight.addEventListener('scroll', onScroll, { passive:true });
    applyP();

    document.getElementById('mBackdrop').style.display = 'block';
    document.getElementById('mSheet').style.display    = 'block';
    document.getElementById('closeBtn').style.display  = 'flex';
    document.getElementById('header').classList.add('hidden');
    document.body.style.overflow = 'hidden';

    document.getElementById('toast').classList.remove('show');

  } catch (error) {
    console.error(error);
    toast('Failed to load movie details. Please try again.');
  }
}

function closeModal() {
  document.getElementById('mBackdrop').style.display = 'none';
  document.getElementById('mSheet').style.display    = 'none';
  document.getElementById('closeBtn').style.display  = 'none';
  document.getElementById('header').classList.remove('hidden');
  document.body.style.overflow = '';
}

function openTrailer() { if (trailer) window.open(`https://youtube.com/watch?v=${trailer}`, '_blank'); }

/* ══════════════════════════════════════════
   PLAYER
══════════════════════════════════════════ */
function openPlayer() {
  // Push the hash to the URL; handleRoute takes over rendering
  window.location.hash = `play/${mediaType}/${curId}`;
}

function buildDD() {
  document.getElementById('srcDD').innerHTML = PROVIDERS.map((p, i) => {
    const c = QC[p.q] || '#aaa';
    return `<div class="src-opt" id="so${i}" onclick="selSrc(${i})">
      <span class="opt-n">${i+1}</span>
      <span>Server ${i+1}</span>
      <span class="opt-q" style="color:${c};border:1px solid ${c}33;background:${c}11">${p.q}</span>
    </div>`;
  }).join('');
  updateDD(0);
}

function updateDD(idx) {
  document.getElementById('srcLabel').textContent = `Server ${idx+1}`;
  document.getElementById('srcCount').textContent = `${idx+1}/${PROVIDERS.length}`;
  document.querySelectorAll('.src-opt').forEach((el,i) => el.classList.toggle('sel', i===idx));
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === PROVIDERS.length-1;
}

function toggleDD() {
  ddOpen = !ddOpen;
  document.getElementById('srcDD').classList.toggle('open', ddOpen);
  document.getElementById('srcBtn').classList.toggle('open', ddOpen);
  document.getElementById('srcChev').classList.toggle('up', ddOpen);
}
function closeDD() {
  ddOpen = false;
  document.getElementById('srcDD').classList.remove('open');
  document.getElementById('srcBtn').classList.remove('open');
  document.getElementById('srcChev').classList.remove('up');
}
document.addEventListener('click', e => { if (ddOpen && !document.getElementById('srcWrap').contains(e.target)) closeDD(); });

function selSrc(i)      { closeDD(); loadSrc(i); }
function changeSource(d){ const n=srcIdx+d; if(n>=0&&n<PROVIDERS.length) loadSrc(n); }
function reloadSrc()    { loadSrc(srcIdx); }

function buildSrcUrl(idx) {
  const p = PROVIDERS[idx];
  return mediaType === 'movie' ? p.movie(curId) : p.tv(curId, curS, curE);
}

function loadSrc(idx) {
  stopFb();
  if (idx < 0 || idx >= PROVIDERS.length) { toast('No more servers.'); return; }
  srcIdx = idx;
  const frame = document.getElementById('playerFrame');
  const load  = document.getElementById('pLoading');
  load.classList.remove('gone');
  document.getElementById('pLoadSub').textContent = `Trying server ${idx+1} of ${PROVIDERS.length}…`;
  updateDD(idx);
  frame.src = buildSrcUrl(idx);
  if (mediaType === 'tv') document.getElementById('pSub').textContent = `Season ${curS} · Episode ${curE}`;
  fbTimer = setTimeout(() => {
    if (idx < PROVIDERS.length-1) { toast(`Server ${idx+1} timed out — trying next…`); loadSrc(idx+1); }
    else { load.classList.add('gone'); toast('All servers tried. Pick one manually.', 4000); }
  }, 7000);
  frame.onload = () => { stopFb(); load.classList.add('gone'); };
}
function stopFb() { if (fbTimer) { clearTimeout(fbTimer); fbTimer = null; } }

async function buildSeasons() {
  const seasons = (curItem.seasons||[]).filter(s=>s.season_number>0);
  document.getElementById('seasonSel').innerHTML =
    seasons.map(s=>`<option value="${s.season_number}">Season ${s.season_number}</option>`).join('');
  curS = seasons[0]?.season_number || 1;
  await buildEpisodes(curS);
}
async function onSeasonChange() {
  curS = parseInt(document.getElementById('seasonSel').value);
  await buildEpisodes(curS);
}
async function buildEpisodes(s) {
  const d = await api(`/tv/${curId}/season/${s}`);
  document.getElementById('episodeSel').innerHTML =
    (d.episodes||[]).map(ep => `<option value="${ep.episode_number}">Ep ${ep.episode_number}${ep.name ? ' — '+ep.name : ''}</option>`).join('');
  curE = (d.episodes||[])[0]?.episode_number || 1;
}
function playEp() {
  curS = parseInt(document.getElementById('seasonSel').value);
  curE = parseInt(document.getElementById('episodeSel').value);
  loadSrc(srcIdx);
}

async function loadSimilar() {
  const grid = document.getElementById('simGrid');
  grid.innerHTML = skels(6, true);
  const gmap = mediaType==='movie' ? gMovies : gTv;
  const [sim, rec] = await Promise.all([
    api(`/${mediaType}/${curId}/similar`),
    api(`/${mediaType}/${curId}/recommendations`),
  ]);
  const seen = new Set();
  const results = [...(rec.results||[]), ...(sim.results||[])]
    .filter(i => { if(seen.has(i.id))return false; seen.add(i.id); return true; })
    .slice(0, 18);
  grid.innerHTML = results.length
    ? results.map(item => cardHTML(item, mediaType, gmap)).join('')
    : `<div class="empty">No similar titles</div>`;
}

init();
</script>
