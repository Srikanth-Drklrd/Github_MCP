<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineVault</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --red: #e50914;
  --red2: #b20710;
  --bg: #080808;
  --surface: #111111;
  --surface2: #181818;
  --surface3: #202020;
  --border: rgba(255,255,255,0.07);
  --text: #f0f0f0;
  --muted: #777;
  --header-h: 64px;
  --card-thumb-ratio: 1.42; /* poster width/height ≈ 2:3 */
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
::-webkit-scrollbar{width:5px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#252525;border-radius:4px;}

/* ═══ HEADER ═══ */
header{
  height:var(--header-h);display:flex;justify-content:space-between;align-items:center;
  padding:0 32px;background:rgba(8,8,8,0.95);backdrop-filter:blur(20px);
  position:fixed;top:0;width:100%;z-index:200;
  border-bottom:1px solid var(--border);transition:opacity 0.25s,transform 0.25s;
}
header.hidden{opacity:0;pointer-events:none;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:27px;letter-spacing:3px;color:var(--red);cursor:pointer;user-select:none;}
.nav{display:flex;gap:4px;}
.nav-btn{padding:6px 18px;border-radius:7px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;transition:all 0.2s;}
.nav-btn:hover{color:var(--text);}
.nav-btn.active{background:rgba(229,9,20,0.14);color:var(--text);border:1px solid rgba(229,9,20,0.35);}
.search-wrap{position:relative;}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:0.3;pointer-events:none;}
#searchInput{padding:8px 12px 8px 34px;border-radius:8px;border:1px solid #1e1e1e;background:#131313;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;width:200px;transition:all 0.2s;}
#searchInput:focus{outline:none;border-color:#303030;width:250px;}

/* ═══ PAGES ═══ */
.page{display:none;}
.page.active{display:block;}

/* ═══ HOME ═══ */
#homePage{padding-top:calc(var(--header-h) + 20px);}

/* ═══ SECTION ROW ═══ */
.section{padding:0 0 36px;}
.section-head{
  display:flex;align-items:baseline;justify-content:space-between;
  padding:0 32px;margin-bottom:16px;
}
.section-title{
  font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;
  color:var(--muted);text-transform:uppercase;
}
.section-title span{color:var(--text);}
.see-all{font-size:12px;color:var(--red);cursor:pointer;opacity:0.8;transition:opacity 0.15s;text-decoration:none;}
.see-all:hover{opacity:1;}

/* horizontal scroll row */
.h-row{
  display:flex;gap:14px;
  overflow-x:auto;
  padding:4px 32px 12px;
  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
}
.h-row::-webkit-scrollbar{height:3px;}
.h-row::-webkit-scrollbar-thumb{background:#1e1e1e;border-radius:2px;}

/* search results grid */
.search-section{padding:0 32px 40px;display:none;}
.search-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
  gap:20px;
}

/* ═══════════════════════════════════════════
   CARD  —  flex column, fixed thumb + info panel
   ═══════════════════════════════════════════ */
.card{
  flex-shrink:0;
  width:160px;          /* fixed width in horizontal rows */
  display:flex;
  flex-direction:column;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  background:var(--surface2);
  scroll-snap-align:start;
  transition:transform 0.22s cubic-bezier(.25,.46,.45,.94),box-shadow 0.22s,border-color 0.22s;
  border:1px solid transparent;
  position:relative;
}
.card:hover{
  transform:translateY(-6px) scale(1.03);
  box-shadow:0 18px 44px rgba(0,0,0,0.75);
  border-color:rgba(229,9,20,0.25);
}

/* THUMBNAIL — always a fixed aspect ratio box */
.card-thumb{
  width:100%;
  aspect-ratio:2/3;
  position:relative;
  overflow:hidden;
  flex-shrink:0;
  background:#151515;
}
.card-thumb img{
  width:100%;height:100%;object-fit:cover;display:block;
  transition:transform 0.35s cubic-bezier(.25,.46,.45,.94);
}
.card:hover .card-thumb img{transform:scale(1.06);}
.no-poster{
  width:100%;height:100%;
  background:linear-gradient(160deg,#1d1d1d,#111);
  display:flex;align-items:center;justify-content:center;font-size:38px;
}

/* play button overlay on thumb */
.card-play{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0);
  transition:background 0.22s;
}
.card:hover .card-play{background:rgba(0,0,0,0.38);}
.play-circle{
  width:42px;height:42px;border-radius:50%;
  background:rgba(229,9,20,0.9);
  display:flex;align-items:center;justify-content:center;
  transform:scale(0.65);opacity:0;
  transition:transform 0.22s cubic-bezier(.34,1.56,.64,1),opacity 0.22s;
  box-shadow:0 4px 18px rgba(229,9,20,0.5);
}
.card:hover .play-circle{transform:scale(1);opacity:1;}

/* rating pill — always visible on thumb */
.card-rating{
  position:absolute;top:8px;right:8px;
  background:rgba(0,0,0,0.75);backdrop-filter:blur(6px);
  padding:3px 7px;border-radius:20px;
  font-size:10.5px;font-weight:600;color:#ffd700;
  display:flex;align-items:center;gap:3px;
  border:1px solid rgba(255,215,0,0.2);
}

/* type badge */
.card-type{
  position:absolute;top:8px;left:8px;
  background:rgba(229,9,20,0.85);backdrop-filter:blur(4px);
  padding:2px 7px;border-radius:4px;
  font-size:9px;font-weight:700;color:white;letter-spacing:0.5px;text-transform:uppercase;
}

/* INFO PANEL — fills remaining card height */
.card-info{
  flex:1;                 /* takes all remaining space */
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:10px 10px 10px;
  gap:6px;
  min-height:0;
}
.card-title{
  font-size:12px;font-weight:600;
  line-height:1.35;
  color:var(--text);
  /* allow up to 2 lines */
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
.card-meta-row{
  display:flex;align-items:center;justify-content:space-between;
  gap:4px;margin-top:auto;
}
.card-year{font-size:10.5px;color:var(--muted);}
.card-genre{
  font-size:10px;color:#555;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:70px;
}

/* skeleton */
.skel{
  flex-shrink:0;width:160px;
  border-radius:10px;overflow:hidden;
  background:var(--surface2);
  scroll-snap-align:start;
}
.skel-thumb{
  width:100%;aspect-ratio:2/3;
  background:linear-gradient(90deg,#161616 25%,#1e1e1e 50%,#161616 75%);
  background-size:200% 100%;animation:shimmer 1.5s infinite;
}
.skel-info{padding:10px;}
.skel-line{height:10px;border-radius:4px;margin-bottom:7px;background:linear-gradient(90deg,#161616 25%,#1e1e1e 50%,#161616 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;}
.skel-line.short{width:55%;}
@keyframes shimmer{to{background-position:-200% 0;}}

/* search grid cards are wider */
.search-grid .card{width:100%;}
.search-grid .card-thumb{aspect-ratio:2/3;}

/* ══════════════════════════════════════════════════
   MODAL  —  full-viewport split layout
   Left  = sticky parallax backdrop + floating poster
   Right = scrollable content, always min 100vh
   ══════════════════════════════════════════════════ */

.modal-backdrop{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.88);
  backdrop-filter:blur(24px);
  z-index:300;
}

/* sheet fills the entire viewport — no outer scroll */
.modal-sheet{
  display:none;
  position:fixed;inset:0;
  z-index:310;
  animation:sheetIn 0.3s cubic-bezier(.25,.46,.45,.94);
}
@keyframes sheetIn{
  from{opacity:0;transform:scale(0.97) translateY(12px)}
  to  {opacity:1;transform:scale(1)    translateY(0)}
}

/* inner row: left panel sticky + right panel scrollable */
.modal-inner{
  position:absolute;
  inset:0;
  display:flex;
  overflow:hidden;         /* clip both children */
}

/* ─── LEFT PANEL ─── */
/* sticky, full viewport height, never scrolls */
.modal-left{
  position:relative;
  width:340px;
  flex-shrink:0;
  height:100%;             /* always 100vh */
  overflow:hidden;
  background:#000;
}

/* layer 1: blurred ambient glow (far bg) */
.modal-bg-blur{
  position:absolute;inset:-10%;
  width:120%;height:120%;
  object-fit:cover;
  filter:blur(28px) brightness(0.3) saturate(1.4);
  transform-origin:center;
  will-change:transform;
  pointer-events:none;
}
.modal-bg-blur-ph{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 40%,#1a1a1a,#050505);
}

/* layer 2: sharp backdrop image at 40% opacity (mid) */
.modal-bg-img{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;
  filter:brightness(0.42) saturate(1.15);
  transform-origin:center top;
  will-change:transform;
  pointer-events:none;
}

/* layer 3: directional vignettes */
.modal-bg-vignette{
  position:absolute;inset:0;pointer-events:none;
  background:
    linear-gradient(to right,  rgba(0,0,0,0.55) 0%, transparent 35%, rgba(0,0,0,0.65) 100%),
    linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, transparent 18%, transparent 65%, rgba(0,0,0,0.95) 100%);
}

/* layer 4: poster + meta centered */
.modal-poster-wrap{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:14px;
  padding:36px 24px;
  pointer-events:none;       /* clicks pass through to backdrop */
}

.modal-poster{
  width:154px;
  border-radius:12px;
  box-shadow:
    0 24px 60px rgba(0,0,0,0.9),
    0 0 0 1px rgba(255,255,255,0.09);
  will-change:transform;
  display:block;
  /* transition handled by JS rAF for smoothness */
}

.modal-rating-pill{
  display:flex;align-items:center;gap:6px;
  background:rgba(0,0,0,0.7);
  border:1px solid rgba(255,215,0,0.3);
  border-radius:20px;padding:5px 15px;
  font-size:13px;font-weight:700;color:#ffd700;
  backdrop-filter:blur(10px);
  will-change:transform;
}

/* subtle red accent line on right edge of left panel */
.modal-left::after{
  content:'';
  position:absolute;top:15%;right:0;
  width:1px;height:70%;
  background:linear-gradient(to bottom,transparent,rgba(229,9,20,0.25),transparent);
}

/* ─── RIGHT PANEL ─── */
/* scrollable, min height = viewport so short content fills screen */
.modal-right{
  flex:1;
  height:100%;             /* fills parent which is 100vh */
  overflow-y:auto;
  overflow-x:hidden;
  padding:52px 40px 72px 40px;
  background:linear-gradient(105deg,
    rgba(8,8,8,0.93) 0%,
    rgba(12,12,12,0.97) 40%,
    rgba(14,14,14,1) 100%);
  scrollbar-width:thin;
  scrollbar-color:#252525 transparent;
}
.modal-right::-webkit-scrollbar{width:4px;}
.modal-right::-webkit-scrollbar-thumb{background:#252525;border-radius:2px;}

/* right content min-height so short overviews still fill the panel */
.modal-right-inner{
  min-height:100%;          /* fills the 100vh right panel */
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
}
/* spacer pushes cast section to naturally fill remaining space */
.modal-content-body{
  flex:1;
  display:flex;
  flex-direction:column;
}

.modal-type-badge{
  display:inline-block;
  font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;
  padding:3px 10px;border-radius:4px;
  background:rgba(229,9,20,0.18);border:1px solid rgba(229,9,20,0.32);color:var(--red);
  margin-bottom:12px;
}
.modal-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:38px;letter-spacing:2px;line-height:1.0;
  margin-bottom:7px;color:#fff;
}
.modal-tagline{
  font-size:12.5px;color:#666;font-style:italic;
  margin-bottom:18px;line-height:1.5;
}
.meta-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:20px;}
.chip{padding:5px 12px;border-radius:20px;font-size:11.5px;font-weight:500;}
.chip.red  {background:rgba(229,9,20,0.16);border:1px solid rgba(229,9,20,0.3);color:#ff7070;}
.chip.dim  {background:rgba(255,255,255,0.05);border:1px solid var(--border);color:#aaa;}
.chip.gold {background:rgba(255,215,0,0.08);border:1px solid rgba(255,215,0,0.18);color:#ffd700;}
.chip.green{background:rgba(80,200,100,0.1);border:1px solid rgba(80,200,100,0.2);color:#6ee07a;}

.modal-divider{height:1px;background:rgba(255,255,255,0.06);margin:20px 0;}

.overview{
  font-size:13.5px;line-height:1.82;color:#999;
  margin-bottom:26px;
  flex-shrink:0;
}

.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:30px;}
.btn{display:flex;align-items:center;gap:7px;padding:11px 24px;border-radius:9px;border:none;font-family:'DM Sans',sans-serif;font-size:13.5px;font-weight:600;cursor:pointer;transition:all 0.18s;}
.btn-watch  {background:var(--red);color:white;box-shadow:0 4px 18px rgba(229,9,20,0.35);}
.btn-watch:hover  {background:var(--red2);transform:scale(1.03);box-shadow:0 6px 22px rgba(229,9,20,0.45);}
.btn-trailer{background:rgba(255,255,255,0.07);color:white;border:1px solid rgba(255,255,255,0.14);}
.btn-trailer:hover{background:rgba(255,255,255,0.13);}

/* ─── CAST: vertical scroll list ─── */
.cast-section{
  flex:1;
  display:flex;
  flex-direction:column;
  margin-top:auto;           /* pushed to bottom when content is short */
}
.cast-section h4{
  font-size:10.5px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:1.5px;
  margin-bottom:12px;
}
/* scrollable vertical cast container — fixed height, internal scroll */
.cast-list{
  display:flex;
  flex-direction:column;
  gap:0;
  max-height:340px;
  overflow-y:auto;
  overflow-x:hidden;
  scrollbar-width:thin;
  scrollbar-color:#252525 transparent;
  border-radius:8px;
  /* subtle inner shadow top/bottom to hint scrollability */
  mask-image:linear-gradient(to bottom,transparent 0%,black 4%,black 96%,transparent 100%);
  -webkit-mask-image:linear-gradient(to bottom,transparent 0%,black 4%,black 96%,transparent 100%);
}
.cast-list::-webkit-scrollbar{width:3px;}
.cast-list::-webkit-scrollbar-thumb{background:#252525;border-radius:2px;}
.cast-row{
  display:flex;
  align-items:center;
  gap:12px;
  padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,0.04);
  transition:background 0.15s;
  border-radius:6px;
  padding-left:4px;
}
.cast-row:last-child{border-bottom:none;}
.cast-row:hover{background:rgba(255,255,255,0.04);}

/* square-ish portrait thumbnail */
.cast-thumb{
  width:44px;height:56px;
  border-radius:7px;
  object-fit:cover;
  background:#1a1a1a;
  flex-shrink:0;
  display:block;
}
.cast-thumb-ph{
  width:44px;height:56px;
  border-radius:7px;
  background:#1a1a1a;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.cast-info{flex:1;min-width:0;}
.cast-name{
  font-size:13px;font-weight:500;color:#ddd;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  line-height:1.3;
}
.cast-char{
  font-size:11.5px;color:#555;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-top:2px;line-height:1.3;
}

/* close button */
.close-btn{
  position:fixed;top:14px;right:14px;
  width:38px;height:38px;border-radius:50%;
  border:1px solid rgba(255,255,255,0.12);
  background:rgba(0,0,0,0.9);color:white;font-size:16px;
  cursor:pointer;z-index:999;display:none;
  align-items:center;justify-content:center;transition:all 0.18s;
}
.close-btn:hover{background:rgba(229,9,20,0.75);}

/* ── MOBILE: stack vertically ── */
@media(max-width:700px){
  .modal-inner{flex-direction:column;overflow-y:auto;}
  .modal-left{
    width:100%;
    height:52vw;   /* responsive height on mobile */
    flex-shrink:0;
  }
  .modal-poster{width:100px;}
  .modal-right{
    height:auto;
    padding:22px 18px 44px;
    background:rgba(10,10,10,0.99);
    overflow-y:visible;
  }
  .modal-right-inner{min-height:0;}
  .modal-title{font-size:26px;}
}

/* ═══ PLAYER PAGE ═══ */
#playerPage{padding-top:var(--header-h);min-height:100vh;}
.player-topbar{display:flex;align-items:center;gap:14px;padding:14px 32px 0;}
.back-btn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--text);padding:7px 15px;border-radius:7px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:all 0.18s;}
.back-btn:hover{background:rgba(255,255,255,0.1);}
.player-meta{flex:1;overflow:hidden;}
.player-title-text{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:#bbb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.player-subtitle{font-size:12px;color:var(--muted);margin-top:2px;}
.player-container{max-width:1100px;margin:14px auto 0;padding:0 32px;}
.player-wrapper{position:relative;width:100%;aspect-ratio:16/9;background:#000;border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.9);border:1px solid rgba(255,255,255,0.04);}
#playerFrame{width:100%;height:100%;border:none;display:block;}
.player-loading{position:absolute;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:5;transition:opacity 0.4s;}
.player-loading.gone{opacity:0;pointer-events:none;}
.spinner{width:46px;height:46px;border:3px solid rgba(255,255,255,0.07);border-top-color:var(--red);border-radius:50%;animation:spin 0.85s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:13px;color:var(--muted);}
.loading-sub{font-size:11px;color:#3a3a3a;}

/* source controls */
.controls-row{display:flex;align-items:center;gap:10px;margin-top:12px;flex-wrap:wrap;}
.source-dropdown-wrap{position:relative;flex:1;min-width:180px;}
.source-select-btn{width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 14px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);color:var(--text);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:border-color 0.18s;user-select:none;}
.source-select-btn:hover{border-color:rgba(255,255,255,0.14);}
.source-select-btn.open{border-color:rgba(229,9,20,0.5);}
.src-label{display:flex;align-items:center;gap:8px;}
.src-dot{width:7px;height:7px;border-radius:50%;background:#333;flex-shrink:0;transition:background 0.2s;}
.src-dot.on{background:var(--red);box-shadow:0 0 6px rgba(229,9,20,0.6);}
.src-num{font-size:11px;color:var(--muted);}
.chevron{font-size:10px;color:var(--muted);transition:transform 0.18s;display:inline-block;}
.chevron.up{transform:rotate(180deg);}
.src-dropdown{display:none;position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--surface3);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 14px 40px rgba(0,0,0,0.85);z-index:99;max-height:300px;overflow-y:auto;}
.src-dropdown.open{display:block;animation:dropIn 0.18s ease;}
@keyframes dropIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.src-option{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;font-size:13px;transition:background 0.15s;border-bottom:1px solid rgba(255,255,255,0.03);}
.src-option:last-child{border-bottom:none;}
.src-option:hover{background:rgba(255,255,255,0.05);}
.src-option.selected{background:rgba(229,9,20,0.11);color:#ff9090;}
.opt-num{font-size:11px;color:var(--muted);min-width:22px;}
.opt-badge{margin-left:auto;font-size:10px;padding:2px 7px;border-radius:10px;}
.ctrl-btn{padding:8px 16px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:var(--text);font-family:'DM Sans',sans-serif;font-size:12.5px;cursor:pointer;transition:all 0.18s;white-space:nowrap;}

/* ═══════════════════════════════════════

const API_KEY = "6b2dec73b6697866a50cdaef60ccffcb";
const BASE    = "https://api.themoviedb.org/3";

const IMG_L   = "https://image.tmdb.org/t/p/w1280";

/* genre maps (populated on init) */
let genreMapMovie = {};
let genreMapTv    = {};

/* section definitions per type */
const SECTIONS_MOVIE = [
  { title:"Trending",        sub:"This Week",  endpoint:"/trending/movie/week",           emoji:"🔥" },
  { title:"Trending",        sub:"Today",      endpoint:"/trending/movie/day",            emoji:"⚡" },

  { title:"Popular",         sub:"Right Now",  endpoint:"/movie/popular",                 emoji:"📈" },
  { title:"Upcoming",        sub:"Coming Soon",endpoint:"/movie/upcoming",                emoji:"🗓" },
];
const SECTIONS_TV = [
  { title:"Trending",        sub:"This Week",  endpoint:"/trending/tv/week",              emoji:"🔥" },
  { title:"Trending",        sub:"Today",      endpoint:"/trending/tv/day",               emoji:"⚡" },
  { title:"Airing Today",    sub:"On Air Now", endpoint:"/tv/airing_today",               emoji:"📡" },

];

/* ═══════════════════════════════════════
   STATE
   ═══════════════════════════════════════ */
let currentType    = "movie";
let currentId      = null;
let currentItem    = null;
let trailerKey     = null;
let debounceTimer;
let currentSrcIdx  = 0;
let fallbackTimer  = null;
let dropOpen       = false;
let currentSeason  = 1;
let currentEpisode = 1;

/* ═══════════════════════════════════════
   UTILS
   ═══════════════════════════════════════ */

// TMDB requires HTTPS. If the page is served over plain http (e.g. python -m http.server
// on local network), mobile browsers block mixed-content fetch to https://api.themoviedb.org.
// We use the TMDB v3 API directly — it supports CORS from any origin — but the PAGE itself
// must also be served over HTTPS or the browser will block outgoing HTTPS fetches from an
// HTTP page on iOS/Android. We detect and warn the user.
function checkProtocol() {
  if (location.protocol === 'http:' && !['localhost','127.0.0.1'].includes(location.hostname)) {
    document.getElementById('protocolBanner').style.display = 'flex';
  }
}

async function api(path, page = 1, retries = 2) {
  const sep = path.includes('?') ? '&' : '?';
  const url = `${BASE}${path}${sep}api_key=${API_KEY}&page=${page}`;
  for (let attempt = 0; attempt <= retries; attempt++) {
    try {
      const r = await fetch(url, { mode: 'cors' });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return await r.json();
    } catch (err) {
      if (attempt === retries) {
        console.warn(`[CineVault] API failed: ${url}`, err.message);
        return { _error: err.message };
      }
      // wait 600ms before retry
      await new Promise(res => setTimeout(res, 600));
    }
  }
  return {};
}

function showToast(msg, ms = 3200) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

function buildUrl(idx) {
  const p = PROVIDERS[idx];
  return currentType === 'movie' ? p.movie(currentId) : p.tv(currentId, currentSeason, currentEpisode);
}

function genreName(ids, map) {
  if (!ids || !ids.length) return '';
  return ids.slice(0, 2).map(id => map[id]).filter(Boolean).join(', ');
}

/* ═══════════════════════════════════════
   INIT — fetch genres then load home
   ═══════════════════════════════════════ */
async function init() {
  checkProtocol();
  const [gm, gt] = await Promise.all([
    api('/genre/movie/list'),
    api('/genre/tv/list'),
  ]);
  if (gm._error && gt._error) { showNetworkError(gm._error); return; }
  (gm.genres || []).forEach(g => genreMapMovie[g.id] = g.name);
  (gt.genres || []).forEach(g => genreMapTv[g.id]    = g.name);
  loadHome();
}

function showNetworkError(errMsg) {
  const isHttp  = location.protocol === 'http:';
  const isLocal = /^(192\.|10\.|172\.(1[6-9]|2\d|3[01])\.|localhost|127\.)/.test(location.hostname);
  document.getElementById('sectionsContainer').innerHTML = `
    <div style="max-width:540px;margin:60px auto;padding:0 32px;text-align:center;">
      <div style="font-size:46px;margin-bottom:18px;">📡</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:#e50914;margin-bottom:12px;">Can't Reach TMDB API</div>
      <p style="font-size:13.5px;color:#aaa;line-height:1.75;margin-bottom:20px;">
        ${isHttp && isLocal
          ? `<strong style="color:#ffd700">Your page is served over HTTP.</strong> Mobile browsers block outgoing HTTPS requests from HTTP pages — this is why your laptop works but phones/tablets don't.`
          : `The TMDB API could not be reached from this device. Check your internet connection and try again.`}
      </p>
      <div style="background:#131313;border:1px solid #222;border-radius:10px;padding:16px 18px;text-align:left;font-size:13px;color:#777;line-height:2;">
        <strong style="color:#eee;display:block;margin-bottom:6px;">How to fix:</strong>
        ${isHttp && isLocal ? `
          <span style="color:#ffd700">① Easiest — use npx serve with HTTPS:</span><br>
          <code style="background:#1a1a1a;padding:2px 8px;border-radius:4px;font-size:12px;color:#aaa">npx serve -s . --ssl</code><br>
          <span style="color:#6ca4e8">② Use VS Code Live Server</span> (it serves over HTTPS automatically)<br>
          <span style="color:#6ee07a">③ Deploy to GitHub Pages or Netlify</span> — free &amp; HTTPS by default<br>
          <span style="color:#aaa">④ On your laptop, open <code style="background:#1a1a1a;padding:1px 5px;border-radius:3px">chrome://flags</code> → "Insecure origins treated as secure" and add your IP</span>
        ` : `
          <span style="color:#6ca4e8">• Check the device's internet connection</span><br>
          <span style="color:#aaa">• If on a school/office network, the API domain may be blocked</span><br>
          <span style="color:#aaa">• Try refreshing the page</span>
        `}
      </div>
      <div style="margin-top:12px;font-size:11px;color:#333;font-family:monospace;">error: ${errMsg}</div>
      <button onclick="location.reload()" style="margin-top:20px;padding:10px 28px;background:#e50914;border:none;color:white;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 4px 16px rgba(229,9,20,0.3)">⟳ Retry</button>
    </div>`;
}

/* ═══════════════════════════════════════

   ═══════════════════════════════════════ */
function goHome() {
  stopFallback(); closeDropdown();
  document.getElementById('homePage').classList.add('active');
  document.getElementById('playerPage').classList.remove('active');
  document.getElementById('header').classList.remove('hidden');
  document.body.style.overflow = '';
}

function switchType(type) {
  currentType = type;
  document.getElementById('moviesTab').classList.toggle('active', type === 'movie');
  document.getElementById('tvTab').classList.toggle('active', type === 'tv');
  const q = document.getElementById('searchInput').value.trim();
  if (q) { search(q); return; }
  document.getElementById('searchSection').style.display = 'none';
  loadHome();
}

async function loadHome() {
  document.getElementById('searchSection').style.display = 'none';
  const container   = document.getElementById('sectionsContainer');
  const sections    = currentType === 'movie' ? SECTIONS_MOVIE : SECTIONS_TV;
  const genreMap    = currentType === 'movie' ? genreMapMovie  : genreMapTv;

  // Build skeleton shell immediately
  container.innerHTML = sections.map((s, i) => `
    <div class="section" id="section-${i}">
      <div class="section-head">
        <div class="section-title">${s.emoji} ${s.title} <span>— ${s.sub}</span></div>
      </div>
      <div class="h-row" id="row-${i}">
        ${Array(10).fill(skelCard()).join('')}
      </div>
    </div>`).join('');

  // Fetch all sections in parallel (2 pages each = ~40 items per row)
  sections.forEach(async (s, i) => {
    const [p1, p2] = await Promise.all([
      api(s.endpoint, 1),
      api(s.endpoint, 2),
    ]);
    const results = [...(p1.results || []), ...(p2.results || [])];
    const row = document.getElementById(`row-${i}`);
    if (!row) return;
    if (!results.length) { row.innerHTML = `<p style="color:#444;padding:20px;font-size:13px">No results</p>`; return; }
    row.innerHTML = results.map(item => cardHTML(item, currentType, genreMap)).join('');
  });
}

/* ═══════════════════════════════════════
   CARD HTML
   ═══════════════════════════════════════ */
function skelCard() {
  return `<div class="skel">
    <div class="skel-thumb"></div>
    <div class="skel-info">
      <div class="skel-line"></div>
      <div class="skel-line short"></div>
    </div>
  </div>`;
}

function cardHTML(item, type, genreMap) {
  const title  = item.title || item.name || 'Untitled';
  const year   = (item.release_date || item.first_air_date || '').split('-')[0];
  const rating = item.vote_average ? item.vote_average.toFixed(1) : null;
  const poster = item.poster_path ? IMG_S + item.poster_path : null;
  const gLabel = genreName(item.genre_ids, genreMap);
  const mtype  = item.media_type || type;
  const typeBadge = (item.media_type && item.media_type !== type)
    ? `<div class="card-type">${item.media_type === 'movie' ? 'Film' : 'TV'}</div>` : '';

  return `<div class="card" onclick="openPreview(${item.id},'${mtype}')">
    <div class="card-thumb">
      ${poster
        ? `<img src="${poster}" alt="${title}" loading="lazy">`
        : `<div class="no-poster">🎬</div>`}
      <div class="card-play">
        <div class="play-circle">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </div>
      </div>
      ${rating ? `<div class="card-rating">★ ${rating}</div>` : ''}
      ${typeBadge}
    </div>
    <div class="card-info">
      <div class="card-title">${title}</div>
      <div class="card-meta-row">
        <span class="card-year">${year}</span>
        ${gLabel ? `<span class="card-genre">${gLabel}</span>` : ''}
      </div>
    </div>
  </div>`;
}

/* ═══════════════════════════════════════
   SEARCH
   ═══════════════════════════════════════ */
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => search(e.target.value), 380);
});

async function search(q) {
  if (!q.trim()) {
    document.getElementById('searchSection').style.display = 'none';
    document.getElementById('sectionsContainer').style.display = '';
    loadHome();
    return;
  }
  document.getElementById('sectionsContainer').style.display = 'none';
  const ss = document.getElementById('searchSection');
  ss.style.display = 'block';
  document.getElementById('searchLabel').textContent = `"${q}"`;

  const grid = document.getElementById('searchGrid');
  grid.innerHTML = Array(12).fill(skelCard()).join('');
  // swap to grid-style skeletons
  grid.querySelectorAll('.skel').forEach(s => s.style.width = '100%');

  // fetch 2 pages for more results
  const genreMap = currentType === 'movie' ? genreMapMovie : genreMapTv;
  const [p1, p2] = await Promise.all([
    api(`/search/multi?query=${encodeURIComponent(q)}`, 1),
    api(`/search/multi?query=${encodeURIComponent(q)}`, 2),
  ]);
  const results = [...(p1.results||[]), ...(p2.results||[])]
    .filter(x => x.media_type === 'movie' || x.media_type === 'tv');

  if (!results.length) {
    grid.innerHTML = `<div class="empty-state"><p>No results for "${q}"</p></div>`;
    return;
  }
  grid.innerHTML = results.map(item => cardHTML(item, currentType, genreMap)).join('');
}

/* ═══════════════════════════════════════
   MODAL
   ═══════════════════════════════════════ */
async function openPreview(id, type) {
  type = type || currentType;
  currentId = id; currentType = type;
  document.getElementById('moviesTab').classList.toggle('active', type === 'movie');
  document.getElementById('tvTab').classList.toggle('active', type === 'tv');

  const [d, credits, videos] = await Promise.all([
    api(`/${type}/${id}`),
    api(`/${type}/${id}/credits`),
    api(`/${type}/${id}/videos`),
  ]);
  currentItem = d;

  const leftPanel  = document.getElementById('modalLeft');
  const posterWrap = document.getElementById('modalPosterWrap');
  const blurPh     = document.getElementById('modalBlurPh');

  // ─── Remove old dynamic images ───────────────────────────
  ['modalBgBlur','modalBgImg'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.remove();
  });

  const imgSrc     = d.backdrop_path ? IMG_L + d.backdrop_path : (d.poster_path ? IMG_S + d.poster_path : null);
  const posterSrc  = d.poster_path   ? IMG_S + d.poster_path   : null;

  if (imgSrc) {
    blurPh.style.display = 'none';

    // layer 1: blurred ambient (use poster for more colour saturation)
    const blurImg    = document.createElement('img');
    blurImg.id       = 'modalBgBlur';
    blurImg.className= 'modal-bg-blur';
    blurImg.src      = posterSrc || imgSrc;
    blurImg.alt      = '';
    leftPanel.insertBefore(blurImg, leftPanel.querySelector('.modal-bg-vignette'));

    // layer 2: sharp backdrop
    const bgImg      = document.createElement('img');
    bgImg.id         = 'modalBgImg';
    bgImg.className  = 'modal-bg-img';
    bgImg.src        = imgSrc;
    bgImg.alt        = '';
    leftPanel.insertBefore(bgImg, leftPanel.querySelector('.modal-bg-vignette'));
  } else {
    blurPh.style.display = 'flex';
  }

  // ─── Poster + rating pill ────────────────────────────────
  posterWrap.innerHTML = `
    ${posterSrc
      ? `<img class="modal-poster" id="modalPosterImg" src="${posterSrc}" alt="">`
      : `<div style="font-size:56px;filter:drop-shadow(0 8px 24px rgba(0,0,0,0.8))">🎬</div>`}
    <div class="modal-rating-pill" id="modalRatingPill">
      ★ ${d.vote_average?.toFixed(1) || '—'}
      <span style="font-size:10px;font-weight:400;color:#aa9500;margin-left:4px">/10</span>
    </div>`;

  // ─── Type badge ──────────────────────────────────────────
  document.getElementById('modalTypeBadge').innerHTML =
    `<span class="modal-type-badge">${type === 'tv' ? 'TV Series' : 'Film'}</span>`;

  // ─── Text content ────────────────────────────────────────
  document.getElementById('modalTitle').textContent   = d.title || d.name;
  document.getElementById('modalTagline').textContent = d.tagline || '';

  const genres  = (d.genres||[]).slice(0,3).map(g=>`<span class="chip dim">${g.name}</span>`).join('');
  const runtime = d.runtime
    ? `<span class="chip gold">⏱ ${Math.floor(d.runtime/60)}h ${d.runtime%60}m</span>` : '';
  const eps     = d.number_of_episodes
    ? `<span class="chip gold">📺 ${d.number_of_episodes} eps</span>` : '';
  const status  = d.status ? `<span class="chip green">${d.status}</span>` : '';
  const yr      = (d.release_date||d.first_air_date||'').split('-')[0];
  document.getElementById('modalMeta').innerHTML =
    `<span class="chip red">★ ${d.vote_average?.toFixed(1)||'—'}</span>
     ${yr ? `<span class="chip dim">${yr}</span>` : ''}
     ${runtime}${eps}${status}${genres}`;

  document.getElementById('modalOverview').textContent = d.overview || 'No description available.';

  // ─── Trailer ─────────────────────────────────────────────
  const trailer = (videos.results||[]).find(x=>x.site==='YouTube'&&x.type==='Trailer')
               || (videos.results||[]).find(x=>x.site==='YouTube');
  trailerKey = trailer ? trailer.key : null;
  const tb = document.getElementById('trailerBtn');
  tb.disabled = !trailerKey; tb.style.opacity = trailerKey ? '1' : '0.4';

  // ─── Cast: vertical list ─────────────────────────────────
  const castHtml = (credits.cast||[]).slice(0,25).map(p => `
    <div class="cast-row">
      ${p.profile_path
        ? `<img class="cast-thumb" src="${IMG_S}${p.profile_path}" alt="${p.name}" loading="lazy">`
        : `<div class="cast-thumb-ph">👤</div>`}
      <div class="cast-info">
        <div class="cast-name">${p.name}</div>
        ${p.character
          ? `<div class="cast-char">${p.character.replace(/\(.*?\)/g,'').trim()}</div>`
          : ''}
      </div>
    </div>`).join('');
  document.getElementById('modalCast').innerHTML =
    castHtml || '<p style="color:#444;font-size:12px;padding:8px 0">No cast data</p>';

  // ─── Smooth parallax via rAF ─────────────────────────────
  // The right panel scrolls; we move the left panel layers at different rates.
  // Using requestAnimationFrame + a flag for performance.
  const rightPanel = document.getElementById('modalRight');
  let rafId = null;
  let lastScroll = 0;

  function onRightScroll() {
    lastScroll = rightPanel.scrollTop;
    if (!rafId) rafId = requestAnimationFrame(applyParallax);
  }

  function applyParallax() {
    rafId = null;
    const t       = lastScroll;
    const bgBlur  = document.getElementById('modalBgBlur');
    const bgImg   = document.getElementById('modalBgImg');
    const poster  = document.getElementById('modalPosterImg');
    const pill    = document.getElementById('modalRatingPill');

    // bg blur: slow drift down (barely visible, adds depth)
    if (bgBlur) bgBlur.style.transform  = `translateY(${t * 0.08}px)`;

    // sharp backdrop: medium-speed upward parallax + slight zoom out
    if (bgImg)  bgImg.style.transform   = `translateY(${t * 0.22}px) scale(1.12)`;

    // poster: gentle float up + very subtle scale-down as you scroll
    if (poster) poster.style.transform  = `translateY(${t * 0.07}px) scale(${Math.max(0.88, 1 - t * 0.00018)})`;

    // rating pill drifts slightly slower than poster
    if (pill)   pill.style.transform    = `translateY(${t * 0.04}px)`;
  }

  // Reset scroll and listener
  rightPanel.scrollTop = 0;
  rightPanel.removeEventListener('scroll', rightPanel._parallaxFn);
  rightPanel._parallaxFn = onRightScroll;
  rightPanel.addEventListener('scroll', onRightScroll, { passive: true });
  // apply initial state
  applyParallax();

  // ─── Show modal ──────────────────────────────────────────
  document.getElementById('modalBackdrop').style.display = 'block';
  document.getElementById('modalSheet').style.display    = 'block';
  document.getElementById('closeBtn').style.display      = 'flex';
  document.getElementById('header').classList.add('hidden');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalBackdrop').style.display = 'none';
  document.getElementById('modalSheet').style.display    = 'none';
  document.getElementById('closeBtn').style.display      = 'none';
  document.getElementById('header').classList.remove('hidden');
  document.body.style.overflow = '';
  // detach scroll listener
  const rp = document.getElementById('modalRight');
  if (rp) rp.onscroll = null;
}

function openTrailer() {
  if (trailerKey) window.open(`https://youtube.com/watch?v=${trailerKey}`, '_blank');
}

/* ═══════════════════════════════════════
   PLAYER
   ═══════════════════════════════════════ */
async function openPlayer() {
  closeModal();
  currentSeason = 1; currentEpisode = 1;
  document.getElementById('homePage').classList.remove('active');
  document.getElementById('playerPage').classList.add('active');
  document.getElementById('header').classList.remove('hidden');
  document.body.style.overflow = '';
  document.getElementById('playerTitleText').textContent = currentItem ? (currentItem.title||currentItem.name) : '';
  document.getElementById('playerSubtitle').textContent  = '';

  if (currentType === 'tv') {
    document.getElementById('episodeRow').style.display = 'flex';
    await buildSeasonEpisodeSelectors();
  } else {
    document.getElementById('episodeRow').style.display = 'none';
  }
  buildSourceDropdown();
  loadSource(0);
  loadSimilar();
}

/* source dropdown */
function buildSourceDropdown() {
  const dd = document.getElementById('srcDropdown');
  dd.innerHTML = PROVIDERS.map((p, i) => {
    const qcol  = QUALITY_COLOR[p.quality]||'#aaa';
    const badge = p.quality ? `<span class="opt-badge" style="color:${qcol};border:1px solid ${qcol}33;background:${qcol}14">${p.quality}</span>` : '';
    return `<div class="src-option" id="srcOpt${i}" onclick="selectSource(${i})">
              <span class="opt-num">${i+1}</span>
              <span>Server ${i+1}</span>${badge}</div>`;
  }).join('');
  updateDropdownUI(0);
}

function updateDropdownUI(idx) {
  document.getElementById('srcBtnText').textContent = `Server ${idx+1}`;
  document.getElementById('srcBtnNum').textContent  = `${idx+1} / ${PROVIDERS.length}`;
  document.querySelectorAll('.src-option').forEach((el,i)=>el.classList.toggle('selected',i===idx));
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === PROVIDERS.length-1;
  const opt = document.getElementById(`srcOpt${idx}`);
  if (opt) opt.scrollIntoView({block:'nearest'});
}

function toggleDropdown() {
  dropOpen = !dropOpen;
  document.getElementById('srcDropdown').classList.toggle('open', dropOpen);
  document.getElementById('sourceSelectBtn').classList.toggle('open', dropOpen);
  document.getElementById('srcChevron').classList.toggle('up', dropOpen);
}
function closeDropdown() {
  dropOpen = false;
  document.getElementById('srcDropdown').classList.remove('open');
  document.getElementById('sourceSelectBtn').classList.remove('open');
  document.getElementById('srcChevron').classList.remove('up');
}
document.addEventListener('click', e => {
  if (dropOpen && !document.getElementById('sourceDropdownWrap').contains(e.target)) closeDropdown();
});
function selectSource(idx) { closeDropdown(); loadSource(idx); }
function changeSource(dir) { const n=currentSrcIdx+dir; if(n>=0&&n<PROVIDERS.length) loadSource(n); }
function reloadSource() { loadSource(currentSrcIdx); }

function loadSource(idx) {
  stopFallback();
  if (idx<0||idx>=PROVIDERS.length){showToast('No more servers available.');return;}
  currentSrcIdx = idx;
  const frame   = document.getElementById('playerFrame');
  const loading = document.getElementById('playerLoading');
  loading.classList.remove('gone');
  document.getElementById('loadingSub').textContent = `Trying server ${idx+1} of ${PROVIDERS.length}…`;
  updateDropdownUI(idx);
  frame.src = buildUrl(idx);
  if (currentType==='tv') document.getElementById('playerSubtitle').textContent=`Season ${currentSeason} · Episode ${currentEpisode}`;
  fallbackTimer = setTimeout(() => {
    if (idx < PROVIDERS.length-1) { showToast(`Server ${idx+1} timed out — trying next…`); loadSource(idx+1); }
    else { loading.classList.add('gone'); showToast('All servers tried. Select one manually.',4500); }
  }, 7000);
  frame.onload = () => { stopFallback(); loading.classList.add('gone'); };
}
function stopFallback() { if(fallbackTimer){clearTimeout(fallbackTimer);fallbackTimer=null;} }

/* TV selectors */
async function buildSeasonEpisodeSelectors() {
  const seasons = (currentItem.seasons||[]).filter(s=>s.season_number>0);
  document.getElementById('seasonSel').innerHTML = seasons.map(s=>`<option value="${s.season_number}">Season ${s.season_number}</option>`).join('');
  currentSeason = seasons[0]?.season_number||1;
  await buildEpisodeSelector(currentSeason);
}
async function onSeasonChange() {
  currentSeason = parseInt(document.getElementById('seasonSel').value);
  await buildEpisodeSelector(currentSeason);
}
async function buildEpisodeSelector(seasonNum) {
  const d = await api(`/tv/${currentId}/season/${seasonNum}`);
  const eps = d.episodes||[];
  document.getElementById('episodeSel').innerHTML = eps.map(ep=>`<option value="${ep.episode_number}">Ep ${ep.episode_number}${ep.name?' — '+ep.name:''}</option>`).join('');
  currentEpisode = eps[0]?.episode_number||1;
}
function playEpisode() {
  currentSeason  = parseInt(document.getElementById('seasonSel').value);
  currentEpisode = parseInt(document.getElementById('episodeSel').value);
  loadSource(currentSrcIdx);
}

/* similar */
async function loadSimilar() {
  const grid = document.getElementById('similarGrid');
  grid.innerHTML = Array(6).fill('<div class="skeleton skel" style="width:100%"><div class="skel-thumb"></div><div class="skel-info"><div class="skel-line"></div><div class="skel-line short"></div></div></div>').join('');
  const genreMap = currentType==='movie'?genreMapMovie:genreMapTv;
  const [sim,rec] = await Promise.all([
    api(`/${currentType}/${currentId}/similar`),
    api(`/${currentType}/${currentId}/recommendations`),
  ]);
  const seen = new Set();
  const results = [...(rec.results||[]),...(sim.results||[])]
    .filter(i=>{if(seen.has(i.id))return false;seen.add(i.id);return true;})
    .slice(0,16);
  if (!results.length){grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1"><p style="color:#444">No similar titles</p></div>`;return;}
  grid.innerHTML = results.map(item=>cardHTML(item,currentType,genreMap)).join('');
}

/* ═══════════════════════════════════════
   KICK OFF
   ═══════════════════════════════════════ */
init();
</script>
